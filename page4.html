<!DOCTYPE html>
<!--
  ============================================================
  page4.html — Interactive Spider Clockface
  ============================================================
  PURPOSE: A real-time analog clock with a spider character
  crawling around the clock face. The spider's position moves
  with the hour hand, and it has animated expressions and legs.
  
  All colors styled in blood red (#C8102E) theme.
  Shows current Asia/Kolkata (IST) time.

  STRUCTURE:
  - <svg>: The clock face and spider graphics
  - <script>: page4.js (clock logic + spider animation)
  ============================================================
-->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spider Clockface — Page 5/7</title>
  <link rel="stylesheet" href="page4.css">
</head>
<body>

  <div class="clock-container">
    <svg id="clockSvg" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
      <!-- Clock face background -->
      <circle cx="200" cy="200" r="190" fill="#0a0202" stroke="#c8102e" stroke-width="3"/>
      
      <!-- Hour markers -->
      <g id="markers">
        <!-- Markers generated by JS -->
      </g>
      
      <!-- Clock hands -->
      <line id="hourHand" x1="200" y1="200" x2="200" y2="100" stroke="#c8102e" stroke-width="6" stroke-linecap="round"/>
      <line id="minuteHand" x1="200" y1="200" x2="200" y2="60" stroke="#c8102e" stroke-width="4" stroke-linecap="round"/>
      <line id="secondHand" x1="200" y1="200" x2="200" y2="40" stroke="#ff3b5c" stroke-width="2" stroke-linecap="round"/>
      
      <!-- Center pin -->
      <circle cx="200" cy="200" r="8" fill="#c8102e" stroke="#000" stroke-width="1"/>
      
      <!-- Spider group (will be positioned by JS) -->
      <g id="spider">
        <!-- Spider body -->
        <ellipse id="spider-body" cx="0" cy="0" rx="12" ry="8" fill="#c8102e"/>
        <!-- Spider head -->
        <circle id="spider-head" cx="0" cy="-8" r="5" fill="#7a0a1c"/>
        <!-- Spider eyes -->
        <circle cx="-2" cy="-9" r="1.5" fill="#ff5577"/>
        <circle cx="2" cy="-9" r="1.5" fill="#ff5577"/>
        <!-- Spider legs (8 total) -->
        <g id="spider-legs">
          <!-- Legs generated by JS -->
        </g>
      </g>
    </svg>
  </div>

  <div class="clock-info">
    <h1>Spider Clockface</h1>
    <p>Asia/Kolkata · Live Time</p>
  </div>

  <script src="page4.js"></script>
  <script src="nav.js"></script>
</body>
</html>
